<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cute Cat — Your Fluffy Friend</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            background: linear-gradient(135deg, #fff9fb 0%, #fff0f3 50%, #ffe9ef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(255,141,161,0.25);
            padding: 30px 40px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,225,230,0.8);
            position: relative;
        }
        .language-switch {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            background: white;
            padding: 5px;
            border-radius: 40px;
            border: 2px solid #ffe4e1;
            z-index: 100;
        }
        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #bcaaa4;
        }
        .lang-btn.active { background: #ff8da1; color: white; }
        .premium-banner {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow { 0%,100% { box-shadow:0 0 5px rgba(255,180,71,0.5); } 50% { box-shadow:0 0 20px rgba(255,180,71,0.8); } }
        .web3-section { margin-top: 60px; margin-bottom: 20px; }
        .wallet-status {
            background: #f5f0f2;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 14px;
        }
        .wallet-button {
            background: linear-gradient(135deg, #ff8da1, #ffb7c5);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .network-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .network-btn {
            flex: 1;
            background: #fff;
            border: 2px solid #ffd1dc;
            border-radius: 30px;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .network-btn.active { background: #ff8da1; color: white; border-color: #ff8da1; }
        .pay-button-web3 {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .cat-hero-container { width: 100%; max-width: 500px; margin: 20px auto; cursor: pointer; }
        .cat-hero-container svg { width: 100%; height: auto; display: block; }
        .cat-eyes { animation: blink 4s infinite; transform-origin: center; }
        @keyframes blink { 0%,90%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.05); } }
        .thought-bubble {
            background: white;
            border-radius: 35px;
            padding: 25px 30px;
            margin: 20px auto;
            max-width: 95%;
            min-height: 150px;
            position: relative;
            border: 2px solid #ffe0e6;
            background: linear-gradient(135deg, #fff, #fffafc);
        }
        .thought-bubble::before {
            content: "💭";
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            opacity: 0.6;
        }
        .cat-message {
            font-size: 20px;
            font-weight: 600;
            color: #ff8da1;
            line-height: 1.5;
            text-align: left;
        }
        .cat-message small {
            font-size: 13px;
            color: #bcaaa4;
            display: block;
            margin-top: 12px;
            text-align: right;
            font-style: italic;
        }
        .pet-button {
            background: linear-gradient(135deg, #ffb7c5, #ff8da1);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
        }
        .cat-name { font-size: 24px; font-weight: 800; color: #ff8da1; margin: 10px 0 5px; }
        .cat-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .cat-option {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 40px;
            background: #fff;
            border: 2px solid #ffe4e1;
            font-weight: 700;
            color: #ffb7b2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .cat-option.active {
            border-color: #ff8da1;
            background: #fff0f3;
            color: #ff8da1;
            transform: translateY(-2px);
        }
        .help-section {
            background: #fff9fb;
            border-radius: 40px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #ffe4e1;
        }
        .help-title { font-size: 18px; color: #b28dff; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .help-input {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
        }
        .help-button {
            background: #b28dff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 12px;
            width: 100%;
            transition: all 0.3s;
            opacity: 0.5;
            cursor: not-allowed;
        }
        .help-button.active {
            opacity: 1;
            cursor: pointer;
        }
        .help-button.active:hover {
            background: #9f73ff;
            transform: translateY(-2px);
        }
        .loading-dots { display: inline-block; }
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .bounce-animation { animation: bounce 0.5s ease; }
        @media (max-width: 600px) {
            .app-container { padding: 20px; }
            .cat-message { font-size: 16px; }
            .thought-bubble::before { display: none; }
            .language-switch { top: 15px; right: 15px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="language-switch">
        <button class="lang-btn" id="langEn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" id="langRu" onclick="setLanguage('ru')">RU</button>
    </div>

    <div id="premiumBanner" class="premium-banner" style="display: none;">✨ PREMIUM ACTIVE ✨</div>

    <div class="web3-section">
        <div class="wallet-status" id="walletStatus">
            <span id="walletStatusText">🦊 Wallet not connected</span>
            <div>
                <button class="wallet-button" onclick="connectMetaMask()">🦊 MetaMask</button>
                <button class="wallet-button" onclick="connectTrustWallet()">📱 Trust Wallet</button>
            </div>
        </div>
        <div id="walletInfo" style="display: none; margin-bottom: 15px;"></div>
        <div class="network-buttons">
            <button class="network-btn active" onclick="selectNetworkWeb3('eth', this)">💎 Ethereum</button>
            <button class="network-btn" onclick="selectNetworkWeb3('bsc', this)">🔷 BSC</button>
            <button class="network-btn" onclick="selectNetworkWeb3('tron', this)">🌐 TRON</button>
        </div>
        <button class="pay-button-web3" id="payButtonWeb3" onclick="makePaymentWeb3()" style="display: none;">💎 Pay 10 USDT</button>
    </div>

    <div class="hero-section">
        <div class="cat-hero-container" id="catHero" onclick="petCat()">
            <svg id="catSvg" viewBox="0 0 400 400"></svg>
        </div>
        <div class="cat-name" id="catName">✨ Marshmallow ✨</div>
        <div class="cat-selector">
            <div class="cat-option active" data-cat="marshmallow" onclick="selectCat('marshmallow', this)">☁️ <span id="catName1">Marshmallow</span></div>
            <div class="cat-option" data-cat="ginger" onclick="selectCat('ginger', this)">🦁 <span id="catName2">Ginger</span></div>
            <div class="cat-option" data-cat="misty" onclick="selectCat('misty', this)">🩶 <span id="catName3">Misty</span></div>
        </div>
        <div class="thought-bubble">
            <div class="cat-message" id="catMessage">
                Hello there, dear friend! 👋<br><small>I'm here to support you</small>
            </div>
        </div>
        <button class="pet-button" onclick="petCat()" id="petBtn">🐾 Pet the kitty 🐾</button>
    </div>

    <div class="help-section">
        <div class="help-title" id="helpTitle">💬 What's on your mind? 💬</div>
        <input type="text" class="help-input" id="helpInput" placeholder="Share your thoughts, and I'll listen...">
        <button class="help-button" id="helpButton" onclick="askCat()" disabled>✨ Ask the kitty ✨</button>
    </div>
</div>

        misty: `<svg viewBox="0 0 400 400"><defs><radialGradient id="furGradient" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e0e7ed"/><stop offset="100%" stop-color="#cfd9e2"/></radialGradient><filter id="softShadow" x="-0.02" y="-0.02" width="1.04" height="1.04"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="M120 100 L80 40 L140 80 Z" fill="#cbd7e4" stroke="#8f9eb0" stroke-width="3"/><path d="M280 100 L320 40 L260 80 Z" fill="#cbd7e4" stroke="#8f9eb0" stroke-width="3"/><ellipse cx="200" cy="210" rx="135" ry="125" fill="url(#furGradient)" stroke="#8f9eb0" stroke-width="3" filter="url(#softShadow)"/><g class="cat-eyes"><ellipse cx="150" cy="185" rx="16" ry="22" fill="#fff" stroke="#5a6e7c" stroke-width="2"/><ellipse cx="250" cy="185" rx="16" ry="22" fill="#fff" stroke="#5a6e7c" stroke-width="2"/><circle cx="154" cy="190" r="7" fill="#2c3e4e"/><circle cx="254" cy="190" r="7" fill="#2c3e4e"/><circle cx="151" cy="187" r="2.5" fill="white"/><circle cx="251" cy="187" r="2.5" fill="white"/></g><ellipse cx="200" cy="215" rx="18" ry="14" fill="#b7c3d1" stroke="#8f9eb0" stroke-width="2"/><path d="M180 235 Q200 260 220 235" fill="none" stroke="#8f9eb0" stroke-width="6" stroke-linecap="round"/><circle cx="174" cy="241" r="5" fill="#b7c3d1" opacity="0.5"/><circle cx="226" cy="241" r="5" fill="#b7c3d1" opacity="0.5"/><path d="M120 210 L70 205" stroke="#8f9eb0" stroke-width="2"/><path d="M120 220 L70 220" stroke="#8f9eb0" stroke-width="2"/><path d="M120 230 L70 235" stroke="#8f9eb0" stroke-width="2"/><path d="M280 210 L330 205" stroke="#8f9eb0" stroke-width="2"/><path d="M280 220 L330 220" stroke="#8f9eb0" stroke-width="2"/><path d="M280 230 L330 235" stroke="#8f9eb0" stroke-width="2"/><ellipse cx="130" cy="215" rx="20" ry="12" fill="#e0e8f0" opacity="0.7"/><ellipse cx="2     // ===================== ФРАЗЫ ДЛЯ КНОПКИ "ПОГЛАДИТЬ" =====================

        en: [
            "You're already amazing just for being here. 🌸",

            "Ты уже молодец, что заглянул(а) сюда. 🌸",
            "Иногда достаточно просто выдохнуть. Я рядом.",

    // ===================== WEB3 КОНФИГ =====================
    const NETWORKS = {
        eth: { name: "Ethereum", chainId: "0x1", chainName: "Ethereum Mainnet", usdtAddress: "0xdAC17F958D2ee523a2206206994597C13D831ec7", usdcAddress: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", decimals: 6 },
        bsc: { name: "BSC", chainId: "0x38", chainName: "BNB Smart Chain", usdtAddress: "0x55d398326f99059fF775485246999027B3197955", usdcAddress: "0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d", decimals: 18 },

    // ===================== API =====================
    const OPENROUTER_KEY = "sk-or-v1-2c3e4f5g6h7i8j9k0l1m2n3o4p5q6r7s8t9u0v1w2x3y4z5a6b7c8d9e0f1g2h";

    async function askAI(messages) {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 12000);
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENROUTER_KEY}`,
                    "HTTP-Referer": "https://amelkova.github.io/Cute_cat_web/",
                    "X-Title": "Cute Cat"
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-exp:free",
                    messages: messages,
                    temperature: 0.85,
                    max_tokens: 400
                }),
                signal: controller.signal
            });
            clearTimeout(timeout);
            if (response.ok) {
                const data = await response.json();
                let answer = data?.choices?.[0]?.message?.content;
                if (answer && answer.trim().length > 15) return answer.trim();
            }
            return null;
        } catch (e) {
            console.warn("API error:", e);
            return null;
        }
    }

    // ===================== СОСТОЯНИЕ =====================
    let currentNetwork = 'eth', walletConnected = false, walletAddress = '', provider = null, signer = null;
    let isPremium = localStorage.getItem('cat_premium') === 'true';
    let currentCat = 'marshmallow', currentLang = 'en';
    let conversationHistory = [];

    const catNames = { marshmallow: { ru: "Зефирка", en: "Marshmallow" }, ginger: { ru: "Рыжик", en: "Ginger" }, misty: { ru: "Дымка", en: "Misty" } };

    function updateAskButtonState() {
        const askBtn = document.getElementById('helpButton');
        if (walletConnected && isPremium) {
            askBtn.disabled = false;
            askBtn.classList.add('active');
        } else {
            askBtn.disabled = true;
            askBtn.classList.remove('active');
        }
    }

    // ===================== WEB3 ФУНКЦИИ =====================
    function getEthereumProvider() { return window.ethereum || window.web3?.currentProvider || null; }
    
    async function connectMetaMask() {
        const ethProvider = getEthereumProvider();
        if (!ethProvider) {
            document.getElementById('walletStatusText').innerHTML = currentLang === 'ru' ? '⚠️ MetaMask не найден!' : '⚠️ MetaMask not found!';
            return;
        }
        try {
            const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
            walletAddress = accounts[0]; walletConnected = true; provider = ethProvider;
            const web3Provider = new ethers.providers.Web3Provider(provider);
            signer = web3Provider.getSigner();
            const network = await web3Provider.getNetwork();
            document.getElementById('walletStatusText').innerHTML = currentLang === 'ru' ? `✅ Подключен: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}` : `✅ Connected: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
            document.getElementById('walletInfo').innerHTML = `<div style="padding:10px; background:#e8f5e9; border-radius:20px;">🦊 ${network.name} | ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}</div>`;
            document.getElementById('walletInfo').style.display = 'block';
            document.getElementById('payButtonWeb3').style.display = 'block';
            document.getElementById('catMessage').innerHTML = currentLang === 'ru' ? '🦊 Кошелёк подключён! Теперь можно оплатить премиум.' : '🦊 Wallet connected! You can now pay for premium.';
            updateAskButtonState();
        } catch(e) { document.getElementById('walletStatusText').innerHTML = currentLang === 'ru' ? '❌ Ошибка подключения' : '❌ Connection error'; }
    }
    
    async function connectTrustWallet() { await connectMetaMask(); }
    
    function disconnectWallet() {
        walletConnected = false; walletAddress = ''; provider = null; signer = null;
        document.getElementById('walletStatusText').innerHTML = currentLang === 'ru' ? '🦊 Кошелёк не подключён' : '🦊 Wallet not connected';
        document.getElementById('walletInfo').style.display = 'none';
        document.getElementById('payButtonWeb3').style.display = 'none';
        document.getElementById('catMessage').innerHTML = currentLang === 'ru' ? '🔌 Кошелёк отключён. Подключитесь для оплаты премиума.' : '🔌 Wallet disconnected. Connect to pay for premium.';
        updateAskButtonState();
    }
    
    function selectNetworkWeb3(network, element) {
        currentNetwork = network;
        document.querySelectorAll('.network-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }
    
    async function makePaymentWeb3() {
        if (!walletConnected) {
            document.getElementById('catMessage').innerHTML = currentLang === 'ru' ? '🔌 Сначала подключите кошелёк!' : '🔌 Please connect your wallet first!';
            return;
        }
        if (currentNetwork === 'tron') {
            document.getElementById('catMessage').innerHTML = currentLang === 'ru' ? 
                `💰 Отправьте 10 USDT (TRC20) на адрес:<br><strong>${TRON_RECIPIENT}</strong><br><br><button onclick="confirmManualPayment()" style="margin-top:10px; padding:8px 16px; background:#4caf50; color:white; border:none; border-radius:20px;">✅ Я оплатил(а)</button>` :
                `💰 Send 10 USDT (TRC20) to:<br><strong>${TRON_RECIPIENT}</strong><br><br><button onclick="confirmManualPayment()" style="margin-top:10px; padding:8px 16px; background:#4caf50; color:white; border:none; border-radius:20px;">✅ I paid</button>`;
            return;
        }
        try {
            const web3Provider = new ethers.providers.Web3Provider(provider);
            const signer = web3Provider.getSigner();
            const contract = new ethers.Contract(NETWORKS[currentNetwork].usdtAddress, ['function transfer(address to, uint256 amount) returns (bool)', 'function decimals() view returns (uint8)'], signer);
            const decimals = await contract.decimals();
            const amount = 10 * Math.pow(10, decimals);
            const tx = await contract.transfer(RECIPIENT_ADDRESS, amount);
            await tx.wait();
            activatePremium();
        } catch(e) { document.getElementById('catMessage').innerHTML = currentLang === 'ru' ? `❌ Ошибка: ${e.message || 'Транзакция отклонена'}` : `❌ Error: ${e.message || 'Transaction rejected'}`; }
    }
    
    function confirmManualPayment() { activatePremium(); }
    
    function activatePremium() {
        isPremium = true;
        localStorage.setItem('cat_premium', 'true');
        document.getElementById('premiumBanner').style.display = 'inline-block';
        document.getElementById('catMessage').innerHTML = currentLang === 'ru' ? '✨ Премиум активирован! Теперь я могу поддержать тебя по-настоящему ✨<br><small>Спрашивай о чём угодно 🐱</small>' : '✨ Premium activated! Now I can truly support you ✨<br><small>Ask me anything 🐱</small>';
        updateAskButtonState();
    }

    // ===================== ДИАЛОГ С ПСИХОЛОГОМ =====================
    async function askCat() {
        if (!walletConnected || !isPremium) {
            document.getElementById('catMessage').innerHTML = currentLang === 'ru' 
                ? '🔌 Сначала подключите кошелёк и активируйте премиум, чтобы я мог поддержать тебя полностью.' 
                : '🔌 Please connect your wallet and activate premium so I can fully support you.';
            return;
        }
        
        const question = document.getElementById('helpInput').value.trim();
        const msgBox = document.getElementById('catMessage');
        
        if (!question) {
            msgBox.innerHTML = currentLang === 'ru' 
                ? '🐱 Напиши что-нибудь, и я отвечу.<br><small>Я умею слушать и поддерживать</small>' 
                : '🐱 Write something, and I will answer.<br><small>I know how to listen and support</small>';
            return;
        }

        const activeCat = document.querySelector('.cat-option.active').dataset.cat;
        const catNameDisplay = catNames[activeCat][currentLang];
        
        conversationHistory.push({ role: "user", content: question });
        if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
        
        msgBox.innerHTML = currentLang === 'ru' 
            ? `Мурр... я слушаю тебя внимательно<span class='loading-dots'></span><br><small>Я хочу помочь тебе разобраться</small>` 
            : `Purr... I'm listening carefully<span class='loading-dots'></span><br><small>I want to help you understand</small>`;
        
        const systemPrompt = `You are a professional psychologist in the form of a gentle, fluffy cat. Your task:
- Listen carefully and reflect the client's feelings with empathy
- Ask thoughtful, open-ended questions to help them explore their thoughts deeper
- Never give generic advice — tailor your responses to what they've shared
- Keep responses warm, concise (3-5 sentences), and always end with a question to continue the dialogue
- Use soft cat metaphors (purring, paws, whiskers) naturally, but maintain psychological depth
- Draw from the conversation history to make your responses feel personal and connected
- Be genuine, supportive, and help them gain insight, not just feel better temporarily`;

        const messages = [
            { role: "system", content: systemPrompt },
            ...conversationHistory
        ];
        
        const answer = await askAI(messages);
        
        if (answer && answer.length > 15) {
            conversationHistory.push({ role: "assistant", content: answer });
            msgBox.innerHTML = `${answer}<br><small>🐱 ${catNameDisplay}</small>`;
        } else {
            const fallback = currentLang === 'ru' ? [
                "Я слышу тебя, друг. Расскажи подробнее, что сейчас чувствуешь? 💖",
                "Это важно, что ты делишься. Как бы ты описал(а) это чувство одним словом? 🐱",
                "Мур… Похоже, это непросто. Что в этой ситуации для тебя самое трудное? 🌸",
                "Спасибо за доверие. А что бы ты посоветовал(а) другу, окажись он на твоём месте? ✨"
            ] : [
                "I hear you, friend. Tell me more — what are you feeling right now? 💖",
                "It's important that you're sharing this. How would you describe this feeling in one word? 🐱",
                "Purr… This sounds difficult. What's the hardest part of this situation for you? 🌸",
                "Thank you for trusting me. What advice would you give a friend if they were in your shoes? ✨"
            ];
            const fallbackMsg = fallback[Math.floor(Math.random() * fallback.length)];
            conversationHistory.push({ role: "assistant", content: fallbackMsg });
            msgBox.innerHTML = `${fallbackMsg}<br><small>🐱 ${catNameDisplay}</small>`;
        }
        
        document.getElementById('helpInput').value = '';
    }

    function petCat() {
        const hero = document.getElementById('catHero');
        hero.classList.add('bounce-animation');
        setTimeout(() => hero.classList.remove('bounce-animation'), 500);
        const phrases = petPhrases[currentLang];
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('catMessage').innerHTML = `${randomPhrase}<br><small>${currentLang === 'ru' ? 'Спасибо, что погладил(а)! 🐱' : 'Thank you for petting me! 🐱'}</small>`;
    }

    function selectCat(catId, element) {
        currentCat = catId;
        document.getElementById('catSvg').innerHTML = catSvgs[catId];
        document.querySelectorAll('.cat-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('catName').innerHTML = `✨ ${catNames[catId][currentLang]} ✨`;
        document.getElementById('catMessage').innerHTML = currentLang === 'ru' 
            ? `Мур! Я ${catNames[catId][currentLang]}, и я готов(а) тебя слушать!` 
            : `Purr! I'm ${catNames[catId][currentLang]}, and I'm ready to listen to you!`;
        conversationHistory = [];
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('cat_lang', lang);
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langRu').classList.toggle('active', lang === 'ru');
        document.getElementById('catName1').innerText = catNames.marshmallow[lang];
        document.getElementById('catName2').innerText = catNames.ginger[lang];
        document.getElementById('catName3').innerText = catNames.misty[lang];
        document.getElementById('catName').innerHTML = `✨ ${catNames[currentCat][lang]} ✨`;
        document.getElementById('helpTitle').innerHTML = lang === 'ru' ? "💬 Расскажи, что у тебя на душе 💬" : "💬 What's on your mind? 💬";
        document.getElementById('helpInput').placeholder = lang === 'ru' ? "Напиши, и я тебя поддержу..." : "Share your thoughts, and I'll listen...";
        document.getElementById('helpButton').innerHTML = lang === 'ru' ? "✨ Спросить у котика ✨" : "✨ Ask the kitty ✨";
        document.getElementById('petBtn').innerHTML = lang === 'ru' ? "🐾 Погладить котика 🐾" : "🐾 Pet the kitty 🐾";
        if (walletConnected) {
            document.getElementById('walletStatusText').innerHTML = lang === 'ru' ? `✅ Подключен: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}` : `✅ Connected: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
        } else {
            document.getElementById('walletStatusText').innerHTML = lang === 'ru' ? '🦊 Кошелёк не подключён' : '🦊 Wallet not connected';
        }
        document.getElementById('payButtonWeb3').innerHTML = lang === 'ru' ? '💎 Оплатить 10 USDT' : '💎 Pay 10 USDT';
        conversationHistory = [];
        updateAskButtonState();
    }

    // Инициализация
    const savedLang = localStorage.getItem('cat_lang') || 'en';
    setLanguage(savedLang);
    document.getElementById('catSvg').innerHTML = catSvgs.marshmallow;
    if (isPremium) document.getElementById('premiumBanner').style.display = 'inline-block';
    updateAskButtonState();
</script>
</body>
</html>
