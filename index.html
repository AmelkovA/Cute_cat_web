<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cute Cat — Кот-психолог с Web3</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #fff9fb 0%, #fff0f3 50%, #ffe9ef 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(255, 141, 161, 0.25);
            padding: 30px 40px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 225, 230, 0.8);
            position: relative;
        }

        .premium-banner {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 180, 71, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 180, 71, 0.8); }
        }

        .wallet-status {
            background: #f5f0f2;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .wallet-connected {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }

        .wallet-button {
            background: linear-gradient(135deg, #ff8da1, #ffb7c5);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .wallet-button:hover {
            transform: translateY(-2px);
        }

        .network-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .network-btn {
            flex: 1;
            background: #fff;
            border: 2px solid #ffd1dc;
            border-radius: 30px;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .network-btn.active {
            background: #ff8da1;
            color: white;
            border-color: #ff8da1;
        }

        .pay-button-web3 {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .pay-button-web3:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 180, 71, 0.4);
        }

        .language-switch {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            background: white;
            padding: 5px;
            border-radius: 40px;
            border: 2px solid #ffe4e1;
            z-index: 10;
        }

        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #bcaaa4;
        }

        .lang-btn.active {
            background: #ff8da1;
            color: white;
        }

        .cat-hero-container {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1));
        }

        .cat-hero-container:hover {
            transform: scale(1.02);
        }

        .cat-hero-container svg {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.05); }
        }

        .cat-eyes {
            animation: blink 4s infinite;
            transform-origin: center;
        }

        .thought-bubble {
            background: white;
            border-radius: 35px;
            padding: 25px 30px;
            margin: 20px auto;
            max-width: 95%;
            min-height: 150px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 2px solid #ffe0e6;
            background: linear-gradient(135deg, #fff, #fffafc);
        }

        .thought-bubble::before {
            content: "💭";
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            opacity: 0.6;
        }

        .cat-message {
            font-size: 20px;
            font-weight: 600;
            color: #ff8da1;
            line-height: 1.5;
            text-align: left;
        }

        .cat-message small {
            font-size: 13px;
            color: #bcaaa4;
            display: block;
            margin-top: 12px;
            text-align: right;
            font-style: italic;
        }

        .pet-button {
            background: linear-gradient(135deg, #ffb7c5, #ff8da1);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 141, 161, 0.4);
            margin: 15px 0;
        }

        .pet-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 141, 161, 0.5);
        }

        .cat-name {
            font-size: 24px;
            font-weight: 800;
            color: #ff8da1;
            margin: 10px 0 5px;
            letter-spacing: 1px;
        }

        .cat-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .cat-option {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 40px;
            background: #fff;
            border: 2px solid #ffe4e1;
            transition: all 0.3s;
            font-weight: 700;
            color: #ffb7b2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .cat-option.active {
            border-color: #ff8da1;
            background: #fff0f3;
            color: #ff8da1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 141, 161, 0.2);
        }

        .help-section {
            background: #fff9fb;
            border-radius: 40px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #ffe4e1;
        }

        .help-title {
            font-size: 18px;
            color: #b28dff;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .help-input {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .help-input:focus {
            border-color: #b28dff;
            box-shadow: 0 0 0 3px rgba(178, 141, 255, 0.1);
        }

        .help-button {
            background: #b28dff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 12px;
            transition: all 0.3s;
            width: 100%;
            cursor: pointer;
        }

        .help-button:hover {
            background: #9f73ff;
            transform: translateY(-2px);
        }

        .loading-dots {
            display: inline-block;
        }
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .bounce-animation {
            animation: bounce 0.5s ease;
        }

        @media (max-width: 600px) {
            .app-container { padding: 20px; }
            .cat-message { font-size: 16px; }
            .thought-bubble::before { display: none; }
            .language-switch { top: 15px; right: 15px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="language-switch">
        <button class="lang-btn" id="langEn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" id="langRu" onclick="setLanguage('ru')">RU</button>
    </div>

    <div id="premiumBanner" class="premium-banner" style="display: none;">✨ PREMIUM ACTIVE ✨</div>

    <!-- Web3 кошелек -->
    <div class="wallet-status" id="walletStatus">
        <span>🦊 Кошелёк не подключён</span>
        <div>
            <button class="wallet-button" onclick="connectMetaMask()">🦊 MetaMask</button>
            <button class="wallet-button" onclick="connectTrustWallet()">📱 Trust Wallet</button>
        </div>
    </div>

    <div id="walletInfo" style="display: none; margin-bottom: 15px;"></div>

    <div class="network-buttons" id="networkButtons">
        <button class="network-btn active" onclick="selectNetworkWeb3('eth', this)">💎 Ethereum</button>
        <button class="network-btn" onclick="selectNetworkWeb3('bsc', this)">🔷 BSC</button>
        <button class="network-btn" onclick="selectNetworkWeb3('tron', this)">🌐 TRON</button>
    </div>

    <button class="pay-button-web3" id="payButtonWeb3" onclick="makePaymentWeb3()" style="display: none;">💎 Оплатить 10 USDT</button>

    <div class="hero-section">
        <div class="cat-hero-container" id="catHero" onclick="petCat()">
            <svg id="catSvg" viewBox="0 0 400 400"></svg>
        </div>
        <div class="cat-name" id="catName">✨ Зефирка ✨</div>
        <div class="cat-selector">
            <div class="cat-option active" data-cat="marshmallow" onclick="selectCat('marshmallow', this)">☁️ <span id="catName1">Зефирка</span></div>
            <div class="cat-option" data-cat="ginger" onclick="selectCat('ginger', this)">🦁 <span id="catName2">Рыжик</span></div>
            <div class="cat-option" data-cat="misty" onclick="selectCat('misty', this)">🩶 <span id="catName3">Дымка</span></div>
        </div>
        <div class="thought-bubble">
            <div class="cat-message" id="catMessage">
                Привет, мой хороший! 👋<br><small>Я здесь, чтобы поддержать тебя</small>
            </div>
        </div>
        <button class="pet-button" onclick="petCat()" id="petBtn">🐾 Погладить котика 🐾</button>
    </div>

    <div class="help-section">
        <div class="help-title" id="helpTitle">💬 Расскажи, что у тебя на душе 💬</div>
        <input type="text" class="help-input" id="helpInput" placeholder="Напиши, и я тебя поддержу...">
        <button class="help-button" id="helpButton" onclick="askCat()">✨ Спросить у котика ✨</button>
    </div>
</div>

    // ===================== WEB3 ФУНКЦИИ =====================
    function getEthereumProvider() {
        if (window.ethereum) return window.ethereum;
        if (window.web3?.currentProvider) return window.web3.currentProvider;
        return null;
    }

    async function connectMetaMask() {
        const ethProvider = getEthereumProvider();
        if (!ethProvider) {
            document.getElementById('walletStatus').innerHTML = `<span>⚠️ MetaMask не найден!</span><div><button class="wallet-button" onclick="connectMetaMask()">🔄 Повторить</button></div>`;
            return;
        }
        try {
            const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
            walletAddress = accounts[0];
            walletConnected = true;
            provider = ethProvider;
            const web3Provider = new ethers.providers.Web3Provider(provider);
            signer = web3Provider.getSigner();
            const network = await web3Provider.getNetwork();
            document.getElementById('walletStatus').innerHTML = `<span>✅ Подключен: ${walletAddress.substring(0,6)}...${walletAddress.substring(38)}</span><div><button class="wallet-button" onclick="disconnectWallet()">🔌 Отключить</button></div>`;
            document.getElementById('walletInfo').innerHTML = `<div style="padding:10px; border-radius:20px; background:#e8f5e9;">🦊 ${network.name} | ${walletAddress.substring(0,6)}...${walletAddress.substring(38)}</div>`;
            document.getElementById('walletInfo').style.display = 'block';
            document.getElementById('payButtonWeb3').style.display = 'block';
            document.getElementById('catMessage').innerHTML = `🦊 Кошелёк подключён! Теперь можно оплатить премиум.`;
        } catch(e) {
            document.getElementById('walletStatus').innerHTML = `<span>❌ Ошибка подключения</span><div><button class="wallet-button" onclick="connectMetaMask()">🔄 Повторить</button></div>`;
        }
    }

    async function connectTrustWallet() {
        await connectMetaMask();
    }

    function disconnectWallet() {
        walletConnected = false;
        walletAddress = '';
        provider = null;
        signer = null;
        document.getElementById('walletStatus').innerHTML = `<span>🦊 Кошелёк не подключён</span><div><button class="wallet-button" onclick="connectMetaMask()">🦊 MetaMask</button><button class="wallet-button" onclick="connectTrustWallet()">📱 Trust Wallet</button></div>`;
        document.getElementById('walletInfo').style.display = 'none';
        document.getElementById('payButtonWeb3').style.display = 'none';
        document.getElementById('catMessage').innerHTML = `🔌 Кошелёк отключён. Подключитесь для оплаты премиума.`;
    }

    function selectNetworkWeb3(network, element) {
        currentNetworkWeb3 = network;
        document.querySelectorAll('.network-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

    async function makePaymentWeb3() {
        if (!walletConnected) { document.getElementById('catMessage').innerHTML = `🔌 Сначала подключите кошелёк!`; return; }
        const network = WALLETS_WEB3[currentNetworkWeb3];
        if (currentNetworkWeb3 === 'tron') {
            document.getElementById('catMessage').innerHTML = `💰 Отправьте 10 USDT (TRC20) на адрес:<br><strong>${network.address}</strong><br><br><button onclick="confirmManualPayment()" style="margin-top:10px; padding:8px 16px; background:#4caf50; color:white; border:none; border-radius:20px; cursor:pointer;">✅ Я оплатил(а)</button>`;
            return;
        }
        try {
            const web3Provider = new ethers.providers.Web3Provider(provider);
            const signer = web3Provider.getSigner();
            const contract = new ethers.Contract(network.usdtAddress, [
                'function transfer(address to, uint256 amount) returns (bool)',
                'function decimals() view returns (uint8)',
                'function balanceOf(address) view returns (uint256)'
            ], signer);
            const decimals = await contract.decimals();
            const amount = 10 * Math.pow(10, decimals);
            const balance = await contract.balanceOf(walletAddress);
            if (balance.lt(amount)) { document.getElementById('catMessage').innerHTML = `❌ Недостаточно USDT! Нужно 10 USDT`; return; }
            document.getElementById('catMessage').innerHTML = `⏳ Отправка транзакции... Подпишите в кошельке`;
            const tx = await contract.transfer(network.address, amount);
            document.getElementById('catMessage').innerHTML = `✅ Транзакция отправлена! Хэш: ${tx.hash.substring(0,20)}...<br>Ожидание подтверждения...`;
            await tx.wait();
            activatePremium();
        } catch(e) { document.getElementById('catMessage').innerHTML = `❌ Ошибка: ${e.message || 'Транзакция отклонена'}`; }
    }

    function confirmManualPayment() { activatePremium(); }

    function activatePremium() {
        isPremium = true;

            msgBox.innerHTML = `💎 Для того, чтобы я мог поддержать тебя в твоей ситуации, понимая её полностью — оплати премиум доступ. 💎<br><small>Всего 10 USDT на 12 месяцев</small>`;
            return;
        }
        const activeCat = document.querySelector('.cat-option.active').dataset.cat;
        const catNameDisplay = catNames[activeCat][currentLang];
        msgBox.innerHTML = `Мурр... я слушаю тебя внимательно<span class='loading-dots'></span><br><small>Я хочу помочь тебе по-настоящему</small>`;
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "HTTP-Referer": window.location.href, "X-Title": "Cute Cat Psychologist" },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-exp:free",
                    messages: [{ role: "system", content: currentLang === 'ru' ? "Ты профессиональный психолог в образе нежного кота. Отвечай тепло, мудро, коротко (2-4 предложения). Всегда заканчивай добрым советом." : "You are a professional psychologist in the form of a gentle cat. Respond warmly, wisely, concisely (2-4 sentences). Always end with a kind piece of advice." }, { role: "user", content: question }],
                    temperature: 0.85,
                    max_tokens: 300
                })
            });
            const data = await response.json();
            let answer = data?.choices?.[0]?.message?.content;
            if (!answer) throw new Error("no answer");
            msgBox.innerHTML = `${answer}<br><small>🐱 ${catNameDisplay}</small>`;
        } catch(e) { msgBox.innerHTML = `✨ Немного магии сбоит, но я всё равно рядом. Попробуй ещё раз ✨<br><small>🐱 ${catNameDisplay}</small>`; }
    }

        document.getElementById('catMessage').innerHTML = `${randomPhrase}<br><small>Спасибо, что погладил(а)! 🐱</small>`;

    }
